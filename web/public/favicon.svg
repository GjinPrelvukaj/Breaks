<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="ring" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8401C"/>
      <stop offset="100%" stop-color="#F5921E"/>
    </linearGradient>
    <radialGradient id="flame" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#FFD0A0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F5921E" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="32" height="32" rx="7.5" fill="#1A110C"/>

  <!-- arc ring: ~300° with gap at top-left -->
  <circle
    cx="16" cy="16" r="10"
    fill="none"
    stroke="url(#ring)"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-dasharray="52.4 62.83"
    transform="rotate(135 16 16)"
  />

  <!-- dark track behind gap -->
  <circle
    cx="16" cy="16" r="10"
    fill="none"
    stroke="#2A1A10"
    stroke-width="3.4"
    stroke-linecap="round"
    stroke-dasharray="10.43 52.4"
    transform="rotate(135 16 16)"
    style="mix-blend-mode:normal"
  />

  <!-- flame teardrop -->
  <path
    d="M16 21.5 C13.2 19 11.5 17 12.5 14 C13.2 11.8 16 10 16 10 C16 10 18.8 11.8 19.5 14 C20.5 17 18.8 19 16 21.5 Z"
    fill="url(#flame)"
  />
</svg>
