name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Derive version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Build Release (ad-hoc signed)
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          xcodebuild \
            -project Breaks.xcodeproj \
            -scheme Breaks \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DD \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Ad-hoc sign and zip
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          APP="build/DD/Build/Products/Release/Breaks.app"
          codesign --force --deep --sign - "$APP"
          mkdir -p dist
          ZIP_NAME="Breaks-v${VERSION}-macOS.zip"
          ditto -c -k --keepParent "$APP" "dist/${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          ls -lh dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "dist/${ZIP_NAME}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "dist/${ZIP_NAME}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Breaks v${VERSION}" \
              --generate-notes
          fi
